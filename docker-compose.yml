# ═══════════════════════════════════════════════════════════
# QueryMind — Docker Compose
# PostgreSQL 17 + pg_hint_plan + TPC-H data
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL with pg_hint_plan ──────────────────────────
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: querymind-postgres
    environment:
      POSTGRES_USER: querymind
      POSTGRES_PASSWORD: querymind
      POSTGRES_DB: tpch
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init_tpch.sql:/docker-entrypoint-initdb.d/01_init_tpch.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querymind -d tpch"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: '2g'  # Increase shared memory for complex queries
    command: >
      postgres
        -c shared_preload_libraries='pg_hint_plan'
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_worker_processes=4
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
        -c log_min_duration_statement=1000
        -c statement_timeout=60000

  # ── QueryMind Agent Services ─────────────────────────────
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: querymind-train
    environment:
      QUERYMIND_DB_URL: postgresql://querymind:querymind@postgres:5432/tpch
      QUERYMIND_MODEL_PATH: /app/checkpoints/querymind_final
      WANDB_MODE: offline
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    command: ["querymind-train", "--total-timesteps", "5000"]
    profiles: ["train"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: querymind-api
    environment:
      QUERYMIND_DB_URL: postgresql://querymind:querymind@postgres:5432/tpch
      QUERYMIND_MODEL_PATH: /app/checkpoints/querymind_final
      QUERYMIND_HOST: "0.0.0.0"
      QUERYMIND_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: ["querymind-serve"]

  # ── Monitoring Stack ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: querymind-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  pgdata:
